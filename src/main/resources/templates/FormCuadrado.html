<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comprobador de Cuadrado</title>
</head>
<body>
<h1>¿Es y el cuadrado de x?</h1>
<form action="/cuadrado" method="post">
    <input type="number" step="any" name="x" placeholder="Introduce x" required>
    <input type="number" step="any" name="y" placeholder="Introduce y" required>
    <button type="submit">Comprobar</button>
</form>
</body>
</html>
